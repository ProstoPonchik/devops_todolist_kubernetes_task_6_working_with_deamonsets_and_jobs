apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cronjob
  namespace: mateapp
  labels:
    app: my-cronjob
spec:
  schedule: "*/4 * * * *"
  concurrencyPolicy: Allow
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: my-cronjob-container
            image: busyboxplus:curl
            command: ["sh", "-c", "curl http://todoapp-service.mateapp.svc.cluster.local:80/api/health"]
            resources:
              limits:
                memory: "64Mi"
                cpu: "100m"
              requests:
                memory: "64Mi"
                cpu: "100m"
          restartPolicy: OnFailure